<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WhiteNoise Pro">
    
    <title>WhiteNoise Pro - 白噪音</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>WhiteNoise Pro</h1>
            <p>沉浸式白噪音，专注与放松的完美平衡</p>
        </header>

        <!-- 标签页 -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="sounds">声音</button>
            <button class="tab-btn" data-tab="focus">专注</button>
            <button class="tab-btn" data-tab="breathing">呼吸</button>
        </nav>

        <!-- 控制栏 -->
        <div class="controls">
            <button class="btn btn-primary" id="play-all">
                <span>▶</span> 全部播放
            </button>
            <button class="btn btn-secondary" id="stop-all">
                <span>⏹</span> 停止
            </button>
        </div>

        <!-- 音效页面 -->
        <section id="sounds-tab" class="tab-content active">
            <div class="sounds-grid" id="sounds-grid">
                <!-- 由 JavaScript 动态生成 -->
            </div>
        </section>

        <!-- 专注模式页面 -->
        <section id="focus-tab" class="tab-content" style="display: none;">
            <div class="focus-section">
                <div class="timer-label">专注时间</div>
                <div class="timer-display" id="timer-display">25:00</div>
                <div class="controls">
                    <button class="btn btn-primary" id="timer-start">开始</button>
                    <button class="btn btn-secondary" id="timer-reset">重置</button>
                </div>
                <p style="color: var(--text-secondary); margin-top: 24px;">
                    番茄工作法：25 分钟专注 + 5 分钟休息
                </p>
            </div>
        </section>

        <!-- 呼吸练习页面 -->
        <section id="breathing-tab" class="tab-content" style="display: none;">
            <div class="breathing-section">
                <div class="timer-label">4-7-8 呼吸法</div>
                <div class="breathing-circle">
                    <span class="breathing-phase" id="breathing-phase">准备</span>
                </div>
                <p class="breathing-instruction" id="breathing-instruction">
                    吸气 4 秒 · 屏息 7 秒 · 呼气 8 秒
                </p>
                <div class="controls" style="margin-top: 32px;">
                    <button class="btn btn-primary" id="breathing-start">开始练习</button>
                    <button class="btn btn-secondary" id="breathing-stop">停止</button>
                </div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
    <script src="main.js"></script>
    <script src="timer.js"></script>
</body>
</html>
