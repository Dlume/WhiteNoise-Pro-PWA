<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WhiteNoise Pro">
    
    <title>WhiteNoise Pro - 专注与放松</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎵 WhiteNoise Pro</h1>
            <p>沉浸式白噪音，助你专注与放松</p>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-nav">
            <button class="tab-button active" data-tab="sounds">🎵 声音</button>
            <button class="tab-button" data-tab="focus">⏱️ 专注</button>
            <button class="tab-button" data-tab="breathing">🧘 呼吸</button>
        </div>

        <!-- Sounds Tab -->
        <div class="tab-content active" id="sounds-tab">
            <!-- Category Filter -->
            <div class="category-filter">
                <button class="filter-btn active" data-category="all">全部</button>
                <button class="filter-btn" data-category="rain">🌧️ 雨声</button>
                <button class="filter-btn" data-category="water">💧 水声</button>
                <button class="filter-btn" data-category="nature">🌲 自然</button>
                <button class="filter-btn" data-category="urban">🏙️ 城市</button>
                <button class="filter-btn" data-category="white-noise">⚪ 白噪音</button>
            </div>
            
            <!-- Playback Controls -->
            <div class="playback-controls">
                <button class="control-btn play-btn" id="play-all">▶ 播放全部</button>
                <button class="control-btn stop-btn" id="stop-all">⏹ 停止全部</button>
            </div>
            
            <!-- Sound Grid -->
            <div class="sound-grid" id="sounds-grid"></div>
        </div>

        <!-- Focus Mode Tab -->
        <div class="tab-content" id="focus-tab">
            <div class="focus-display">
                <div class="focus-time" id="focus-time">25:00</div>
                <div class="focus-mode work-mode" id="focus-mode">⏰ 工作时间</div>
            </div>
            
            <div class="duration-selector">
                <div class="duration-options">
                    <button class="duration-btn active" data-duration="25">25 分钟</button>
                    <button class="duration-btn" data-duration="30">30 分钟</button>
                    <button class="duration-btn" data-duration="45">45 分钟</button>
                    <button class="duration-btn" data-duration="60">60 分钟</button>
                </div>
            </div>
            
            <div class="playback-controls">
                <button class="control-btn play-btn" id="focus-play">▶ 开始专注</button>
                <button class="control-btn stop-btn" id="focus-stop">⏹ 停止</button>
            </div>
            
            <div style="text-align: center; color: var(--text-secondary); margin-top: 30px;">
                已完成专注：<span id="sessions-completed">0</span> 次
            </div>
        </div>

        <!-- Breathing Tab -->
        <div class="tab-content" id="breathing-tab">
            <div class="breathing-circle" id="breathing-circle"></div>
            <div class="breathing-phase" id="breathing-phase">准备</div>
            
            <div class="playback-controls">
                <button class="control-btn play-btn" id="breathing-start">开始练习</button>
                <button class="control-btn stop-btn" id="breathing-stop">停止</button>
            </div>
            
            <div class="breathing-instructions">
                <strong>4-7-8 呼吸法</strong><br>
                吸气 4 秒 → 屏息 7 秒 → 呼气 8 秒<br>
                帮助放松身心，改善睡眠质量
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="audio-data.js"></script>
    <script src="audio.js"></script>
    <script src="timer.js"></script>
    <script src="app.js"></script>
</body>
</html>
